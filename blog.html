<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Diario de Miri ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
    --ink:       #2a1f1a;
    --paper:     #fdf6ec;
    --cream:     #f5ead8;
    --rose:      #c4768a;
    --rose-dark: #8b3a52;
    --gold:      #b8935a;
    --gold-lt:   #e8c98a;
    --sage:      #7a9e8a;
    --border:    #d4b896;
    --shadow:    rgba(42,31,26,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background-color: #e8dcc8;
    background-image: repeating-linear-gradient(0deg, rgba(160,120,70,0.04) 0px, rgba(160,120,70,0.04) 1px, transparent 1px, transparent 32px);
    font-family: 'Lora', 'Georgia', serif;
    color: var(--ink);
    min-height: 100vh;
}

/* LAYOUT BLOGSPOT-INSPIRED */
.blog-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 40px;
}

/* HEADER minimalista */
.blog-header {
    grid-column: 1 / -1;
    text-align: center;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
}
.blog-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    color: var(--rose-dark);
    letter-spacing: 1px;
}
.blog-subtitle {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--gold);
    margin-top: 6px;
}
.nav-links {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}
.nav-link {
    font-family: 'Lora', serif;
    font-size: 0.8rem;
    padding: 4px 12px;
    background: transparent;
    border: none;
    color: var(--rose-dark);
    cursor: pointer;
    transition: 0.15s;
    text-decoration: none;
}
.nav-link:hover, .nav-link.active {
    background: var(--cream);
    border-radius: 20px;
    color: var(--ink);
}
.logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Lora', serif;
    font-size: 0.75rem;
    color: #999;
    cursor: pointer;
    transition: 0.15s;
    margin-left: 8px;
}
.logout-btn:hover {
    border-color: var(--rose);
    color: var(--rose);
}

/* MAIN FEED - estilo Blogspot */
.post-card {
    background: var(--paper);
    margin-bottom: 35px;
    padding: 0;
    position: relative;
}
.post-cover {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
    margin-bottom: 6px;
}
.post-inner {
    padding: 0 0 20px 0;
}
.post-tag {
    font-family: 'Lora', serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--rose-dark);
    margin-bottom: 8px;
    display: inline-block;
    background: var(--cream);
    padding: 2px 10px;
    border-radius: 20px;
}
.post-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    color: var(--ink);
    line-height: 1.25;
    margin: 8px 0 12px;
    cursor: pointer;
    transition: color 0.15s;
}
.post-title:hover {
    color: var(--rose-dark);
}
.post-excerpt {
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    line-height: 1.7;
    color: #4a3830;
}
.post-excerpt p {
    margin-bottom: 12px;
}
.post-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    padding-top: 12px;
    border-top: 1px solid var(--cream);
    flex-wrap: wrap;
    gap: 12px;
}
.read-more {
    font-family: 'Lora', serif;
    font-size: 0.8rem;
    font-style: italic;
    color: var(--rose-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: 0.12s;
}
.read-more:hover {
    color: var(--rose);
    gap: 10px;
}
.reaction-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Lora', serif;
    transition: 0.12s;
}
.reaction-btn:hover {
    color: var(--rose);
}
.reaction-btn.liked {
    color: var(--rose-dark);
}

/* PAGINACIÓN */
.pagination {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 30px;
    margin-bottom: 20px;
}
.page-btn {
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 8px 16px;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.12s;
    color: var(--ink);
    border-radius: 4px;
}
.page-btn:hover:not(:disabled) {
    background: var(--cream);
    border-color: var(--rose);
}
.page-btn:disabled {
    opacity: 0.4;
    cursor: default;
}
.page-number {
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.12s;
    color: var(--ink);
    border-radius: 4px;
}
.page-number.active {
    background: var(--rose-dark);
    border-color: var(--rose-dark);
    color: white;
}
.page-number:hover:not(.active) {
    background: var(--cream);
}

/* SIDEBAR */
.blog-sidebar {
    display: flex;
    flex-direction: column;
    gap: 28px;
}
.sidebar-widget {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
}
.widget-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 12px 16px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    color: var(--rose-dark);
}
.widget-body {
    padding: 16px;
}
.about-photo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--rose-dark);
    object-fit: cover;
    display: block;
    margin: 0 auto 12px;
}
.about-text {
    font-family: 'Lora', serif;
    font-size: 0.82rem;
    line-height: 1.6;
    color: #5a4035;
    font-style: italic;
    text-align: center;
}
.cat-list {
    list-style: none;
}
.cat-list li {
    border-bottom: 1px dotted var(--border);
    padding: 8px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.cat-list li:last-child {
    border-bottom: none;
}
.cat-list a {
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    color: var(--rose-dark);
    text-decoration: none;
    cursor: pointer;
    transition: 0.1s;
}
.cat-list a:hover {
    color: var(--gold);
}
.cat-count {
    font-size: 0.7rem;
    background: var(--cream);
    padding: 2px 8px;
    border-radius: 20px;
    color: var(--gold);
}
.quote-block {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--rose-dark);
    border-left: 3px solid var(--gold);
    padding-left: 14px;
    margin: 0;
}
.quote-attr {
    font-family: 'Lora', serif;
    font-size: 0.7rem;
    color: #999;
    margin-top: 8px;
    text-align: right;
}
.archive-list {
    list-style: none;
}
.archive-list li {
    padding: 6px 0;
    border-bottom: 1px dotted var(--border);
    font-family: 'Lora', serif;
    font-size: 0.82rem;
    display: flex;
    justify-content: space-between;
}
.archive-list li:last-child {
    border-bottom: none;
}
.archive-list a {
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: 0.1s;
}
.archive-list a:hover {
    color: var(--rose-dark);
}

/* MODAL */
.entry-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,31,26,0.75);
    backdrop-filter: blur(4px);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.entry-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
.entry-modal {
    background: var(--paper);
    border-radius: 4px;
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    position: relative;
}
.entry-close {
    position: sticky;
    top: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--cream);
    padding: 12px 20px;
    display: flex;
    justify-content: flex-end;
    z-index: 10;
}
.entry-close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--rose-dark);
    cursor: pointer;
    width: 32px;
    height: 32px;
    font-size: 1rem;
    transition: 0.1s;
}
.entry-close-btn:hover {
    background: var(--rose-dark);
    color: white;
}
.entry-cover {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    display: block;
}
.entry-body {
    padding: 28px 32px 40px;
}
.entry-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 16px;
}
.entry-content {
    font-family: 'Lora', serif;
    font-size: 1rem;
    line-height: 1.8;
    color: #3a2820;
}
.entry-content p {
    margin-bottom: 18px;
}
.entry-content p:first-child::first-letter {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    float: left;
    line-height: 0.8;
    margin: 6px 8px 0 0;
    color: var(--rose-dark);
}
.entry-content blockquote {
    border-left: 4px solid var(--rose-dark);
    background: var(--cream);
    padding: 14px 20px;
    margin: 20px 0;
    font-style: italic;
}

/* LOADING & EMPTY */
.loading, .empty-feed {
    text-align: center;
    padding: 50px;
    font-family: 'Lora', serif;
    color: #aaa;
    font-style: italic;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .blog-container {
        grid-template-columns: 1fr;
        gap: 30px;
        padding: 20px 16px;
    }
    .entry-body {
        padding: 20px;
    }
    .post-cover {
        max-height: 200px;
    }
}
</style>
</head>
<body>

<div class="blog-container">
    <header class="blog-header">
        <div class="blog-title">✦ Diario de Miri ✦</div>
        <div class="blog-subtitle">pensamientos, notas y pequeñas memorias</div>
        <div class="nav-links">

            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </header>

    <main class="blog-main" id="postFeed">
        <div class="loading">Cargando entradas...</div>
    </main>

    <aside class="blog-sidebar">
        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-feather-alt"></i> &nbsp;Sobre este blog</div>
            <div class="widget-body">
                <img src="imagenes_rooster/miri.webp" alt="Miri" class="about-photo" onerror="this.style.display='none'">
                <p class="about-text">Apuntes de una mente que piensa demasiado. Bienvenido a mis páginas.</p>
            </div>
        </div>

        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-tags"></i> &nbsp;Categorías</div>
            <div class="widget-body">
                <ul class="cat-list" id="categoryList"></ul>
            </div>
        </div>

        <div class="sidebar-widget">
            <div class="widget-title"><i class="fas fa-quote-left"></i> &nbsp;Frase del día</div>
            <div class="widget-body">
                <blockquote class="quote-block" id="dailyQuote">Cargando...</blockquote>
                <div class="quote-attr" id="dailyQuoteAttr"></div>
            </div>
        </div>

        <div >
            <div class="widget-body">
                <ul class="archive-list" id="archiveList"></ul>
            </div>
        </div>
    </aside>

    <div class="pagination" id="pagination"></div>
</div>

<!-- MODAL -->
<div class="entry-overlay" id="entryOverlay">
    <div class="entry-modal">
        <div class="entry-close">
            <button class="entry-close-btn" onclick="closeEntry()">✕</button>
        </div>
        <div id="entryModalContent"></div>
    </div>
</div>

<script>
// ========== PROTECCIÓN DE SESIÓN ==========
(function() {
    const sessionKey = 'alphaAgency_miriSession';
    if (!localStorage.getItem(sessionKey)) {
        window.location.replace('login.html?dest=blog.html');
    }
})();

// ========== GLOBALES ==========
let allPosts = [];       // todos los posts desde JSON
let currentFilter = 'all';
let currentPage = 1;
const POSTS_PER_PAGE = 5;
let likes = JSON.parse(localStorage.getItem('miri_likes') || '{}');

// Frases fijas (no dependen del JSON)
const QUOTES = [
    { q: 'No todas las personas que deambulan están perdidas.', a: 'J.R.R. Tolkien' },
    { q: 'Hay que tener caos dentro de uno para dar luz a una estrella danzante.', a: 'Friedrich Nietzsche' },
    { q: 'Somos la suma de todas las personas que hemos amado.', a: 'Tennessee Williams' },
    { q: 'Escribir es la forma más profunda de leer la vida.', a: 'Francisco Umbral' },
    { q: 'El silencio es el idioma de todas las emociones fuertes.', a: 'Mary Brown' },
    { q: 'Algunos son nacidos grandes, algunos alcanzan la grandeza...', a: 'Shakespeare' }
];

// ========== CARGAR POSTS DESDE JSON ==========
async function loadPosts() {
    try {
        const response = await fetch('posts.json');
        if (!response.ok) throw new Error('No se pudo cargar posts.json');
        const data = await response.json();
        allPosts = data.posts || [];
        
        // Ordenar: del más nuevo al más viejo (por fecha descendente)
        allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        renderEverything();
    } catch (error) {
        console.error(error);
        document.getElementById('postFeed').innerHTML = '<div class="empty-feed">⚠️ No se pudo cargar el archivo posts.json. Asegúrate de que existe.</div>';
    }
}

// ========== RENDER COMPLETO ==========
function renderEverything() {
    updateCategoriesAndArchive();
    renderFeed();
    renderPagination();
}

// Actualizar sidebar (categorías y archivo)
function updateCategoriesAndArchive() {
    // Filtramos por el filtro actual para contar? No, las categorías y archivo cuentan sobre TODOS los posts
    const tagCount = {};
    const monthCount = {};
    
    allPosts.forEach(post => {
        const tag = post.tag || 'sin categoría';
        tagCount[tag] = (tagCount[tag] || 0) + 1;
        
        if (post.date) {
            const month = post.date.slice(0, 7); // YYYY-MM
            monthCount[month] = (monthCount[month] || 0) + 1;
        }
    });
    
    // Render categorías
    const categoryList = document.getElementById('categoryList');
    categoryList.innerHTML = Object.entries(tagCount)
        .map(([tag, count]) => `
            <li>
                <a onclick="setFilter('${tag}')">${tag.charAt(0).toUpperCase() + tag.slice(1)}</a>
                <span class="cat-count">${count}</span>
            </li>
        `).join('');
    
    // Render archivo (orden descendente)
    const archiveList = document.getElementById('archiveList');
    archiveList.innerHTML = Object.entries(monthCount)
        .sort((a, b) => b[0].localeCompare(a[0]))
        .map(([month, count]) => {
            const date = new Date(month + '-01T12:00:00');
            const label = date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long' });
            return `<li><a onclick="setArchiveFilter('${month}')">${label}</a><span class="cat-count">${count}</span></li>`;
        }).join('');
}

// Filtrar posts según tag o archivo
function getFilteredPosts() {
    if (currentFilter === 'all') return allPosts;
    if (currentFilter.startsWith('archive:')) {
        const targetMonth = currentFilter.replace('archive:', '');
        return allPosts.filter(p => p.date && p.date.slice(0, 7) === targetMonth);
    }
    return allPosts.filter(p => (p.tag || 'sin categoría') === currentFilter);
}

function setFilter(tag) {
    currentFilter = tag;
    currentPage = 1;
    // Actualizar clase activa en nav-links
    document.querySelectorAll('.nav-link').forEach(link => {
        const filterVal = link.getAttribute('data-filter');
        if ((filterVal === tag) || (tag === 'all' && filterVal === 'all')) {
            link.classList.add('active');
        } else {
            link.classList.remove('active');
        }
    });
    renderFeed();
    renderPagination();
}

function setArchiveFilter(month) {
    currentFilter = `archive:${month}`;
    currentPage = 1;
    // Quitar active de los nav-links
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    renderFeed();
    renderPagination();
}

// Renderizar posts con paginación
function renderFeed() {
    const filtered = getFilteredPosts();
    const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
    if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    
    const start = (currentPage - 1) * POSTS_PER_PAGE;
    const pagePosts = filtered.slice(start, start + POSTS_PER_PAGE);
    
    const feed = document.getElementById('postFeed');
    
    if (pagePosts.length === 0) {
        feed.innerHTML = '<div class="empty-feed">✨ No hay entradas en esta categoría.</div>';
        return;
    }
    
    feed.innerHTML = pagePosts.map(post => `
        <article class="post-card">
            ${post.cover ? `<img src="${post.cover}" class="post-cover" alt="${post.title}" onerror="this.style.display='none'">` : ''}
            <div class="post-inner">
                <div class="post-tag">${(post.tag || 'sin categoría').toUpperCase()}</div>
                <h2 class="post-title" onclick="openEntry(${post.id})">${escapeHtml(post.title)}</h2>
                <div class="post-excerpt">${post.excerpt || (post.content ? post.content.substring(0, 200) + '...' : '')}</div>
                <div class="post-footer">
                    <a class="read-more" onclick="openEntry(${post.id})">Leer completo <i class="fas fa-arrow-right"></i></a>
                    <div class="post-reaction">
                        <button class="reaction-btn ${likes[post.id] ? 'liked' : ''}" onclick="toggleLike(${post.id}, this)">
                            <i class="fas fa-heart"></i> ${likes[post.id] ? 'Guardado' : 'Guardar'}
                        </button>
                    </div>
                </div>
            </div>
        </article>
    `).join('');
}

function renderPagination() {
    const filtered = getFilteredPosts();
    const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
    const paginationDiv = document.getElementById('pagination');
    
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    
    let pagesHtml = '';
    for (let i = 1; i <= totalPages; i++) {
        pagesHtml += `<button class="page-number ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    
    paginationDiv.innerHTML = `
        <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Anterior</button>
        ${pagesHtml}
        <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Siguiente →</button>
    `;
}

function goToPage(page) {
    const filtered = getFilteredPosts();
    const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderFeed();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleLike(id, btn) {
    likes[id] = !likes[id];
    localStorage.setItem('miri_likes', JSON.stringify(likes));
    btn.classList.toggle('liked');
    btn.innerHTML = `<i class="fas fa-heart"></i> ${likes[id] ? 'Guardado' : 'Guardar'}`;
}

function openEntry(id) {
    const post = allPosts.find(p => p.id === id);
    if (!post) return;
    const contentDiv = document.getElementById('entryModalContent');
    contentDiv.innerHTML = `
        ${post.cover ? `<img src="${post.cover}" class="entry-cover" alt="${post.title}" onerror="this.style.display='none'">` : ''}
        <div class="entry-body">
            <div class="post-tag" style="margin-bottom:10px;">${(post.tag || 'sin categoría').toUpperCase()}</div>
            <h1 class="entry-title">${escapeHtml(post.title)}</h1>
            <div class="entry-content">${post.content || post.excerpt || ''}</div>
        </div>
    `;
    document.getElementById('entryOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeEntry() {
    document.getElementById('entryOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function logout() {
    localStorage.removeItem('alphaAgency_miriSession');
    window.location.href = 'login.html';
}

// Frase del día
(function setDailyQuote() {
    const q = QUOTES[new Date().getDate() % QUOTES.length];
    document.getElementById('dailyQuote').textContent = q.q;
    document.getElementById('dailyQuoteAttr').textContent = '— ' + q.a;
})();

// Event listeners para filtros
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
        const filter = this.getAttribute('data-filter');
        if (filter === 'all') setFilter('all');
        else setFilter(filter);
    });
});

// Clic en overlay para cerrar modal
document.getElementById('entryOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('entryOverlay')) closeEntry();
});

// Inicializar
loadPosts();
</script>
</body>
</html>
